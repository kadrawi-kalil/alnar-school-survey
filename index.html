<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alnasr School Surveys</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e3a8a);
        color: white;
        text-align: center;
        height: 1000;
      }

      header {
        padding: 40px 20px;
      }

      .logo-bar {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .logo-bar img {
        width: 100px;
        height: auto;
        border: 3px solid rgba(255, 255, 255, 0.5);
        border-radius: 12px;
        padding: 8px;
        background: rgba(255, 255, 255, 0.1);
      }

      h1 {
        margin: 10px 0;
        font-size: 30px;
      }

      h2 {
        font-weight: normal;
        font-size: 18px;
        color: #cbd5f5;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        padding: 40px;
        max-width: 900px;
        margin: auto;
      }

      .card {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        transition: 0.3s;
        backdrop-filter: blur(10px);
      }

      .card:hover {
        transform: translateY(-10px);
        background: rgba(255, 255, 255, 0.2);
      }

      .card h3 {
        margin-bottom: 20px;
        font-size: 20px;
      }

      .btn {
        display: inline-block;
        padding: 12px 25px;
        border-radius: 10px;
        text-decoration: none;
        color: white;
        font-weight: bold;
        transition: 0.3s;
      }

      .parent {
        background: #3b82f6;
      }
      .student {
        background: #10b981;
      }
      .teacher {
        background: #f59e0b;
      }

      .btn:hover {
        opacity: 0.85;
      }

      footer {
        margin-top: 40px;
        padding: 20px;
        font-size: 14px;
        color: #cbd5f5;
      }
    </style>
  </head>

  <body>
    <header>
      <!-- 🔷 Logos -->
      <div class="logo-bar">
        <!-- Replace with your school logo -->
        <img
          src="logo1.png"
          alt="Alnasr School emblem showing an open book, a flame above a palm tree and Arabic text naming Alnasr School"
        />

        <!-- Replace with Cognia logo -->
        <img
          src="logo2.png"
          alt="Cognia accreditation logo with a blue arc and text representing school quality assurance"
        />
      </div>

      <h1>Alnasr School</h1>
      <h2>Digital Survey Platform</h2>
    </header>

    <div class="container">
      <!-- Parent Survey -->
      <div class="card">
        <h3>👨‍👩‍👧 Parent Survey</h3>
        <a
          class="btn parent"
          href="https://forms.gle/hxyAeoacmUQZASDP7"
          target="_blank"
        >
          Open Survey
        </a>
      </div>

      <!-- Student Survey -->
      <div class="card">
        <h3>🎓 Student Survey</h3>
        <a
          class="btn student"
          href="https://forms.gle/z7Dq6pZDT6bX2w3J9"
          target="_blank"
        >
          Open Survey
        </a>
      </div>

      <!-- Teacher Survey -->
      <div class="card">
        <h3>👨‍🏫 Teacher Survey</h3>
        <a
          class="btn teacher"
          href="https://forms.gle/svcEzELB9QRM6JaD8"
          target="_blank"
        >
          Open Survey
        </a>
      </div>
    </div>

    <footer>© 2026 Alnasr School | All Rights Reserved</footer>
  </body>
</html>
